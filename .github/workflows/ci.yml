name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        # E501 line-too-long  — docstrings and HTML strings exceed 100 chars
        # W503  — line break before binary operator (PEP8-compliant)
        # E221  — multiple spaces before operator (alignment style, intentional)
        # E402  — module import not at top (sys.path must be set before ids import)
        # E128  — continuation line indent (cosmetic)
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E501,W503,E221,E402,E128 \
            --exclude=__pycache__,*.pyc

  # ── Unit tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ── Docker build check ──────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-ids:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
