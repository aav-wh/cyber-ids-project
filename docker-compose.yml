version: "3.9"

# ── One-command setup ──────────────────────────────────────────────────────────
#   docker-compose up --build
#   API:       http://localhost:5000
#   Dashboard: http://localhost:5000/dashboard
# ─────────────────────────────────────────────────────────────────────────────

services:
  ids-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ai-ids:latest
    container_name: ai-ids-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    # Mount processed artefacts and models as read-only volumes.
    # This keeps the image small (no large .pkl files baked in) and
    # allows updating models without rebuilding the image.
    volumes:
      - ./data/processed:/app/data/processed:ro
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
